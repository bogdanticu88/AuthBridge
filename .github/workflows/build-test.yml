name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true

      - name: Install Dependencies
        run: |
          cd authbridge
          go mod download

      - name: Build
        run: |
          cd authbridge
          go build -v -o authbridge ./main.go

      - name: Test
        run: |
          cd authbridge
          go test -v ./...
