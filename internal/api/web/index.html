<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthBridge | Centralized Auth</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-shield-halved"></i>
            <span>AuthBridge</span>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" data-view="dashboard">
                <i class="fas fa-home-alt"></i> Dashboard
            </div>
            <div class="nav-item" data-view="credentials">
                <i class="fas fa-key"></i> Credentials
            </div>
            <div class="nav-item" data-view="audit">
                <i class="fas fa-terminal"></i> Audit Trail
            </div>
            <div class="nav-item" data-view="settings">
                <i class="fas fa-sliders"></i> Settings
            </div>
        </nav>
        <div class="sidebar-footer" style="padding: 1.5rem; font-size: 0.75rem; color: var(--text-secondary); border-top: 1px solid var(--border-subtle);">
            v1.0.0-stable
        </div>
    </aside>

    <div class="main-layout">
        <header class="top-bar">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search credentials, logs, or tools...">
            </div>
            <div class="top-actions">
                <button class="btn btn-primary" onclick="openModal('add-modal')">
                    <i class="fas fa-plus"></i> New Credential
                </button>
            </div>
        </header>

        <main class="view-container">
            <!-- Dashboard View -->
            <section id="dashboard-view" class="view active">
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="stat-label">Total Credentials</div>
                        <div class="stat-value" id="stat-total-creds">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Active Sessions</div>
                        <div class="stat-value" id="stat-active-sessions">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Total Requests</div>
                        <div class="stat-value" id="stat-total-reqs">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Daemon Status</div>
                        <div class="stat-value" style="color: var(--accent-green)">ONLINE</div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                    <div class="card-section">
                        <h3 style="margin-bottom: 1rem; font-size: 1rem; font-weight: 600;">System Health</h3>
                        <div style="background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 1.5rem;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                <span style="font-size: 0.85rem; color: var(--text-secondary);">Master Key Protection</span>
                                <span style="font-size: 0.85rem; color: var(--accent-green); font-weight: 600;">OS KEYCHAIN</span>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span style="font-size: 0.85rem; color: var(--text-secondary);">Storage Engine</span>
                                <span style="font-size: 0.85rem; color: var(--text-primary); font-family: var(--font-mono);">SQLITE (WAL)</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-section">
                        <h3 style="margin-bottom: 1rem; font-size: 1rem; font-weight: 600;">Recent Audit</h3>
                        <div id="mini-audit-log" style="font-size: 0.8rem; color: var(--text-secondary);">
                            <!-- Loaded via JS -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Credentials View -->
            <section id="credentials-view" class="view">
                <div class="cred-grid" id="credentials-container">
                    <!-- Cards Loaded via JS -->
                </div>
            </section>

            <!-- Audit View -->
            <section id="audit-view" class="view">
                <div style="background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Action</th>
                                <th>Object</th>
                                <th>Source IP</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="audit-full-table">
                            <!-- Loaded via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="add-modal" class="modal-overlay">
        <div class="modal-window">
            <div class="modal-header">
                <h3>Add New Credential</h3>
                <i class="fas fa-times" onclick="closeModal('add-modal')"></i>
            </div>
            <form id="add-cred-form" style="padding: 1.5rem;">
                <div style="margin-bottom: 1.25rem;">
                    <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">CREDENTIAL NAME</label>
                    <input type="text" id="cred-name" placeholder="e.g. production-api-v1" style="width: 100%; padding: 0.75rem; background: var(--bg-main); border: 1px solid var(--border-subtle); border-radius: 6px; color: #fff;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem;">
                    <div>
                        <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">AUTH TYPE</label>
                        <select id="cred-type" style="width: 100%; padding: 0.75rem; background: var(--bg-main); border: 1px solid var(--border-subtle); border-radius: 6px; color: #fff;">
                            <option value="jwt">JWT Token</option>
                            <option value="oauth2">OAuth2 Lifecycle</option>
                            <option value="basic">Basic Auth</option>
                            <option value="cookie">Session Cookies</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">TTL (HOURS)</label>
                        <input type="number" value="24" style="width: 100%; padding: 0.75rem; background: var(--bg-main); border: 1px solid var(--border-subtle); border-radius: 6px; color: #fff;">
                    </div>
                </div>
                <div style="margin-bottom: 1.25rem;">
                    <label style="display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;">CREDENTIAL DATA</label>
                    <textarea id="cred-token" placeholder="Paste JWT, Key, or Password..." style="width: 100%; height: 100px; padding: 0.75rem; background: var(--bg-main); border: 1px solid var(--border-subtle); border-radius: 6px; color: #fff; font-family: var(--font-mono); font-size: 0.8rem;"></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 0.75rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('add-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Object</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        .view { display: none; }
        .view.active { display: block; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-window {
            background: var(--bg-card); width: 500px; border-radius: 12px;
            border: 1px solid var(--border-subtle); overflow: hidden;
        }
        .modal-header {
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-subtle);
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>

    <script src="/static/js/app.js"></script>
</body>
</html>
